    contenido: '<p>En 1995, Pasteler&#237;a 1000 Sabores fue invitada a participar en la creaci&#243;n de la torta m&#225;s grande del mundo, un r&#233;cord Guinness que reuni&#243; a los mejores pasteleros de Chile.</p><p>La torta pes&#243; m&#225;s de 5 toneladas y fue elaborada con ingredientes donados por productores locales. Nuestro equipo estuvo a cargo de la decoraci&#243;n y el dise&#241;o de los pisos superiores.</p><p>Este hito marc&#243; un antes y un despu&#233;s en nuestra historia, posicion&#225;ndonos como referentes de la reposter&#237;a nacional y motiv&#225;ndonos a seguir innovando.</p>'
  },

    id: 2,
    titulo: 'Receta: Cl&#225;sico Manjar chileno',
    imagen: 'torta-manjar.jpg',
    contenido: '<p>El manjar chileno es uno de los dulces m&#225;s tradicionales de nuestra gastronom&#237;a. Te compartimos nuestra receta familiar.</p><p><strong>Ingredientes:</strong></p><ul><li>1 litro de leche entera</li><li>1 taza de az&#250;car</li><li>1 rama de canela</li><li>1 cucharadita de bicarbonato de sodio</li><li>Esencia de vainilla al gusto</li></ul><p><strong>Preparaci&#243;n:</strong></p><p>En una olla grande, mezcla la leche con el az&#250;car y la canela. Lleva a fuego medio, revolviendo constantemente. Agrega el bicarbonato y sigue revolviendo hasta que espese (aproximadamente 45 minutos). Retira la canela, agrega vainilla y deja enfriar.</p>'
  },

    id: 3,
    titulo: 'Consejos para decorar tortas',
    imagen: 'cupcakes.jpg',
    contenido: '<p>Nuestros estudiantes de gastronom&#237;a de Duoc UC comparten sus mejores consejos para decorar tortas como un profesional.</p><p><strong>1. La base es clave:</strong> Aseg&#250;rate de que tu bizcocho est&#233; completamente fr&#237;o antes de decorar.</p><p><strong>2. Usa manga pastelera:</strong> Practica con diferentes boquillas para crear flores, rosetones y bordes.</p><p><strong>3. Colores que contrasten:</strong> Combina colores complementarios para un efecto visual impactante.</p><p><strong>4. Texturas variadas:</strong> Mezcla elementos lisos, rugosos y brillantes para dar profundidad.</p><p><strong>5. Fruta fresca:</strong> Las frutas de estaci&#243;n no solo decoran, sino que aportan frescura y sabor.</p>'
