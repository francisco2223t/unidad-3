<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Productos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/css/style.css">
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar" id="sidebar">
    <h3>1000 Sabores</h3>
    <a href="index.html">Dashboard</a>
    <a href="productos.html" class="active">Productos</a>
    <a href="usuarios.html" id="menuUsuarios">Usuarios</a>
    <a href="../index.html">Ver Tienda</a>
    <a href="#" id="btnCerrarSesion" style="margin-top:20px;opacity:.6">Cerrar Sesi&#243;n</a>
  </aside>
  <main class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <h2 style="margin:0">Productos</h2>
      <a href="producto-form.html" class="btn btn-sm">+ Nuevo Producto</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>C&#243;digo</th><th>Nombre</th><th>Categor&#237;a</th><th>Precio</th><th>Stock</th><th>Stock Cr&#237;tico</th><th>Acciones</th></tr></thead>
        <tbody id="productosTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../src/js/productos.js"></script>
<script>
(function(){
  var user = JSON.parse(localStorage.getItem('ms_usuario_actual'));
  if(!user || (user.tipo !== 'Administrador' && user.tipo !== 'Vendedor')){ window.location.href = '../login.html'; return; }
  if(user.tipo === 'Vendedor'){ var mu = document.getElementById('menuUsuarios'); if(mu) mu.style.display = 'none'; }
  document.getElementById('btnCerrarSesion').addEventListener('click', function(e){ e.preventDefault(); localStorage.removeItem('ms_usuario_actual'); window.location.href = '../login.html'; });
  render();
})();
function render(){
  var tbody = document.getElementById('productosTableBody');
  var prods = getProducts();
  tbody.innerHTML = prods.map(function(p){
    return '<tr>'+
      '<td>'+p.codigo+'</td>'+
      '<td>'+p.nombre+'</td>'+
      '<td>'+p.categoria+'</td>'+
      '<td>$'+p.precio.toLocaleString('es-CL')+'</td>'+
      '<td>'+(p.stock <= p.stockCritico ? '<span style="color:red;font-weight:700">'+p.stock+'</span>' : p.stock)+'</td>'+
      '<td>'+p.stockCritico+'</td>'+
      '<td>'+
        '<a href="producto-form.html?codigo='+p.codigo+'" class="btn btn-sm">Editar</a> '+
        '<button class="btn btn-sm btn-danger" onclick="eliminar(\''+p.codigo+'\')">Eliminar</button>'+
      '</td></tr>';
  }).join('');
}
function eliminar(codigo){
  if(!confirm('Eliminar este producto?')) return;
  var prods = getProducts();
  var idx = prods.findIndex(function(p){ return p.codigo === codigo; });
  if(idx > -1){ prods.splice(idx,1); saveProducts(prods); render(); }
}
</script>
</body>
</html>
